name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: stable

      - name: Generate Android boilerplate
        run: |
          flutter create --platforms=android /tmp/shoplist_boilerplate
          cp /tmp/shoplist_boilerplate/android/build.gradle android/
          cp /tmp/shoplist_boilerplate/android/settings.gradle android/
          cp /tmp/shoplist_boilerplate/android/gradle.properties android/
          cp -r /tmp/shoplist_boilerplate/android/gradle android/
          cp /tmp/shoplist_boilerplate/android/app/build.gradle android/app/
          cp /tmp/shoplist_boilerplate/android/app/src/main/AndroidManifest.xml android/app/src/main/
          for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi mipmap-anydpi-v26; do
            [ -d "/tmp/shoplist_boilerplate/android/app/src/main/res/$dir" ] && \
              cp -r "/tmp/shoplist_boilerplate/android/app/src/main/res/$dir" android/app/src/main/res/ || true
          done

      - name: Fix package name and create MainActivity
        run: |
          sed -i 's/com\.example\.shoplist_boilerplate/com.shoplist.app/g' android/app/build.gradle
          sed -i 's/com\.example\.shoplist_boilerplate/com.shoplist.app/g' android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/kotlin/com/shoplist/app
          printf 'package com.shoplist.app\nimport io.flutter.embedding.android.FlutterActivity\nclass MainActivity: FlutterActivity()\n' > android/app/src/main/kotlin/com/shoplist/app/MainActivity.kt

      - name: Patch AndroidManifest with widget and deeplink
        run: |
          sed -i 's|</activity>|<intent-filter><action android:name="android.intent.action.VIEW"/><category android:name="android.intent.category.DEFAULT"/><data android:scheme="shoplist"/></intent-filter></activity>|' android/app/src/main/AndroidManifest.xml
          sed -i 's|</application>|<receiver android:name=".ShopListWidget" android:exported="true"><intent-filter><action android:name="android.appwidget.action.APPWIDGET_UPDATE"/><action android:name="TOGGLE_ITEM"/></intent-filter><meta-data android:name="android.appwidget.provider" android:resource="@xml/shop_list_widget_info"/></receiver><service android:name=".ShopListWidgetService" android:exported="false" android:permission="android.permission.BIND_REMOTEVIEWS"/></application>|' android/app/src/main/AndroidManifest.xml

      - name: Create required resource files
        run: |
          mkdir -p android/app/src/main/res/values
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <string name="app_name">ShopList</string>\n    <string name="widget_description">Lista de compras interativa</string>\n</resources>\n' > android/app/src/main/res/values/strings.xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar"><item name="android:windowBackground">@android:color/white</item></style>\n    <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar"><item name="android:windowBackground">?android:colorBackground</item></style>\n</resources>\n' > android/app/src/main/res/values/styles.xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">\n    <stroke android:width="2dp" android:color="#CCCCCC"/>\n    <size android:width="22dp" android:height="22dp"/>\n</shape>\n' > android/app/src/main/res/drawable/ic_check_empty.xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<layer-list xmlns:android="http://schemas.android.com/apk/res/android">\n    <item><shape android:shape="oval"><solid android:color="#2D6A4F"/><size android:width="22dp" android:height="22dp"/></shape></item>\n    <item android:drawable="@android:drawable/checkbox_on_background"/>\n</layer-list>\n' > android/app/src/main/res/drawable/ic_check_filled.xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">\n    <solid android:color="#E8F5E9"/>\n    <corners android:radius="12dp"/>\n    <stroke android:width="1dp" android:color="#2D6A4F"/>\n</shape>\n' > android/app/src/main/res/drawable/count_badge.xml

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: shoplist-apk
          path: build/app/outputs/flutter-apk/app-release.apk
